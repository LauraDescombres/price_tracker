{% extends "base.html" %}

{% block content %}
    <h1>Produits suivis</h1>
    <ul>
    {% if produits %}
        {% for produit in produits %}
            <li> Nom : {{ produit.nom }} - Cible : {{ produit.prix_cible | default("Aucune", true) }}</li>
        {% endfor %}
    {% else %}
        <p>Aucun produit</p>
    {% endif %}
    </ul>
{% endblock %}
